# skills/SOURCES.yaml — Central registry for upstream tracking
# ============================================================
# Purpose: Document where each of our 15 global skills came from
#          so we can detect drift and update them later.
#
# Update mechanism: bash scripts/update-skills.sh [--apply|--dry-run]
#
# Types:
#   - self:      self-built, no upstream
#   - verbatim:  imported 100% as-is from upstream (auto-update safe)
#   - reimpl:    lightweight re-implementation (auto-update UNSAFE;
#                manual review required before applying upstream)
# ============================================================

version: 1
last_audit: 2026-06-14

skills:

  # ===== Self-built (4) =====
  - name: karpathy-guidelines
    type: self
    note: "OneTwo auto-injects this on every LLM call. Imported from multica-ai/andrej-karpathy-skills but customized for our 1+1+1 system."

  - name: openspec-integration
    type: self
    note: "Custom routing bridge for OpenSpec. Two-layer trigger (keyword OR semantic) + 4-tier fallback."

  - name: mmx-cli-usage
    type: self
    note: "How to use MiniMax CLI for multimodal + search via bash."

  - name: update-project-meta
    type: self
    note: |
      Maintain project-level docs (CONTEXT.md, AGENTS.md, docs/adr/NNNN-xxx.md).
      Single-writer principle. Requires setup-matt-pocock-skills to have been
      run first (except for CONTEXT.md and ADR writes, which work standalone).
      disable-model-invocation: true — only invoked when the user explicitly asks
      to "记录这个决策" / "加个术语" / "add ADR" / etc.
      Workspace-isolated: writes only to the current opencode session's project
      root (verified via `pwd` / `git rev-parse --show-toplevel`).

